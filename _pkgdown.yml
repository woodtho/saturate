url: ~

template:
  bootstrap: 5
  bslib:
    primary: "#2d6a9f"
    base_font: {google: "Inter"}
    heading_font: {google: "Inter"}
    code_font: {google: "JetBrains Mono"}

home:
  title: "saturate — Qualitative Data Analysis for R"
  description: >
    A modern open-source replacement for RQDA. Code interview transcripts in a
    Shiny GUI, run reliability statistics, track theoretical saturation, and
    export results — all backed by a portable DuckDB file.

navbar:
  structure:
    left: [intro, reference, articles, news]
    right: [github]
  components:
    github:
      icon: fab fa-github
      href: https://github.com/your-org/saturate
      aria-label: GitHub

articles:
  - title: "Getting Started"
    navbar: ~
    contents:
      - user-guide

reference:
  - title: "Project management"
    desc: "Create, open, and close projects; manage versions and locking."
    contents:
      - qc_new
      - qc_open
      - qc_close
      - qc_project_info
      - qc_is_locked
      - qc_lock_project
      - qc_unlock_project
      - qc_get_version
      - qc_list_versions
      - qc_restore_version
      - qc_list_coders
      - saturate-package

  - title: "Documents"
    desc: "Import and manage source documents."
    contents:
