url: https://woodtho.github.io/saturate

template:
  bootstrap: 5
  light-switch: true
  bslib:
    primary: "#1D3D35"
    link-color: "#3E8C7A"
    base_font: {google: "Inter"}
    heading_font: {google: "Inter"}
    code_font: {google: "JetBrains Mono"}
    # Light mode surface colours
    body-bg: "#ffffff"
    body-color: "#1a1a1a"
    navbar-bg: "#1D3D35"
    navbar-fg: "#ffffff"
    # Dark mode is handled via Bootstrap 5 data-bs-theme="dark" + custom CSS below
  includes:
    after_body: |
      <style>
      /* ── Dark mode overrides to match the app's dark theme ───────────────── */
      [data-bs-theme="dark"] {
        --bs-body-bg: #1a1e22;
        --bs-body-color: #d4d8dd;
        --bs-border-color: #2e3540;
        --bs-link-color: #4db399;
        --bs-link-hover-color: #6dcbaf;
        --bs-code-color: #a8c7fa;
        --bs-card-bg: #20262e;
      }
      [data-bs-theme="dark"] .navbar {
        background-color: #111618 !important;
      }
      [data-bs-theme="dark"] pre, [data-bs-theme="dark"] code {
        background: #20262e;
        border-color: #2e3540;
      }
      [data-bs-theme="dark"] .sidebar { background: #20262e; }
      /* ── Light mode navbar accent ─────────────────────────────────────────── */
      .navbar { background-color: #1D3D35 !important; }
      .navbar .navbar-brand, .navbar .nav-link { color: #fff !important; }
      .navbar .nav-link:hover { color: #a8d8cc !important; }
      </style>

home:
  title: "saturate -- Qualitative Data Analysis for R"
  description: >
    A modern open-source replacement for RQDA. Code interview transcripts in a
    Shiny GUI, run reliability statistics, track theoretical saturation, and
    export results -- all backed by a portable DuckDB file.

navbar:
  structure:
    left: [intro, user-guide, reference, news]
    right: [github, lightswitch]
  components:
    user-guide:
      text: "User Guide"
      href: articles/user-guide.html
    github:
      icon: fab fa-github
      href: https://github.com/woodtho/saturate
      aria-label: GitHub

articles:
  - title: "Getting Started"
    navbar: ~
    contents:
      - user-guide

